# Template snippet for an existing nginx server block.
# Replace the placeholders before enabling it on a new host.
#
# __SMART_HOME_PATH__:
#   Path without a trailing slash, for example /smart-home
# __SMART_HOME_SUBPATH__:
#   Path with a trailing slash, for example /smart-home/
# __SMART_HOME_PORT__:
#   Internal Gunicorn port, for example 28681
#
# Put this snippet before a generic `location /` or SPA fallback rule.

location = __SMART_HOME_PATH__ {
    return 301 __SMART_HOME_SUBPATH__;
}

location ^~ __SMART_HOME_SUBPATH__ {
    proxy_pass http://127.0.0.1:__SMART_HOME_PORT__/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_read_timeout 30s;
}
